<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Portfolio | Home</title>
    <style>
        /* Premium Dark Theme Variables */
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #121216;
            --accent: #d4af37; /* Luxury Gold */
            --text-main: #ffffff;
            --text-muted: #a0a0aa;
            --font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        header {
            background-color: rgba(18, 18, 22, 0.95);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--text-main);
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(rgba(10, 10, 12, 0.8), rgba(10, 10, 12, 0.9)), url('placeholder-background.jpg') no-repeat center center/cover;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--accent);
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            background: transparent;
        }

        .btn:hover {
            background-color: var(--accent);
            color: var(--bg-primary);
            cursor: pointer;
        }

        /* Footer */
        footer {
            background-color: var(--bg-secondary);
            padding: 30px 20px;
            text-align: center;
            border-top: 1px solid #222;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            nav ul { display: none; } /* Simplified for mobile layout */
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">TESLA<span>.</span></a>
            <nav>
                <ul>
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="ventures.html">Ventures</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Shaping the Future</h1>
                <p>Exploring the intersection of technology, engineering, and global infrastructure.</p>
                <a href="about.html" class="btn">Explore the Vision</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Executive Portfolio. Prepared for Web Hosting.</p>
    </footer>

</body>
</html>
