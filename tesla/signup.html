<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Tesla</title>
    <style>
        /* Tesla Minimalist Design Language */
        :root {
            --tesla-black: #171a20;
            --tesla-gray: #393c41;
            --tesla-light-gray: #f4f4f4;
            --tesla-blue: #3d69e1;
            --text-dark: #171a20;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Gotham SSm', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header / Logo Navigation */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: flex-start;
        }

        .logo svg {
            width: 120px;
            height: 24px;
            fill: var(--tesla-black);
        }

        /* Form Container */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-container {
            width: 100%;
            max-width: 330px;
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 40px;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 15px;
            color: var(--tesla-gray);
            font-weight: 500;
            margin-bottom: 8px;
            padding-left: 12px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 20px;
            background-color: var(--tesla-light-gray);
            border: 1px solid transparent;
            border-radius: 20px;
            font-size: 14px;
            color: var(--tesla-black);
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #d0d1d2;
            background-color: #ffffff;
            box-shadow: inset 0 0 0 1px #d0d1d2;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin: 25px 0;
            gap: 10px;
        }

        .checkbox-group input {
            margin-top: 4px;
            accent-color: var(--tesla-black);
        }

        .checkbox-group label {
            font-size: 12px;
            line-height: 1.5;
            color: var(--tesla-gray);
            padding-left: 0;
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--tesla-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-submit:hover {
            background-color: #3457b1;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: var(--tesla-gray);
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e4e4;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--tesla-black);
            border: 3px solid var(--tesla-black);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: var(--tesla-black);
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 342 35" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 1.1A9.7 9.7 0 0 1 7 0h11l.5.1a10 10 0 0 1 5.4 3.1L28.2 8l4.3-4.8A10 10 0 0 1 38 0h11a9.7 9.7 0 0 1 7 1.1 10.3 10.3 0 0 1 3.5 5.3L63 21.6h-7.6l-2-6H32.7l-2 6h-7.7l3.7-15.3A10.3 10.3 0 0 1 30.2 11l4.4-4.9L30 1.3H19l-4 4.8 3.7 15.5h-7.7L7 6.4A10.3 10.3 0 0 1 10.5 1.1zM106.2 0h7.6v21.6h-7.6zM137 0h37.4v4.3h-29.8v4.3h28v4.2h-28v4.5h29.8v4.3H137zm52.2 4.3h-16.1V0h39.8v4.3h-16v17.3h-7.7zm57.2 13h23v4.3h-30.6V0h7.6v17.3zm60.7-13h-16.1V0h39.8v4.3h-16v17.3h-7.7zM32.7 11.3h20.7L43 3.1z"/>
            </svg>
        </div>
    </header>

    <main>
        <div class="signup-container">
            <h1>Create Account</h1>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" required autocomplete="given-name">
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" required autocomplete="family-name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="new-password">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the Tesla Terms of Use, Privacy Notice, and data sharing preferences.</label>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="divider">OR</div>

            <a href="login.html" class="btn-secondary">Sign In</a>
        </div>
    </main>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Capture user input
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Save credentials locally in the browser
            localStorage.setItem('registeredEmail', email);
            localStorage.setItem('registeredPassword', password);

            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
