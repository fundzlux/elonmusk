<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Portfolio | Sign In</title>
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #121216;
            --accent: #d4af37;
            --text-main: #ffffff;
            --text-muted: #a0a0aa;
            --font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background-color: var(--bg-secondary);
            border: 1px solid #222;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            border-radius: 4px;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 14px;
            background-color: #18181f;
            border: 1px solid #333;
            color: var(--text-main);
            font-size: 0.95rem;
            border-radius: 2px;
            transition: border-color 0.3s ease;
        }

        input:focus { outline: none; border-color: var(--accent); }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover { background-color: var(--accent); color: var(--bg-primary); }

        .switch-prompt {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .switch-prompt a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Sign In</h2>
        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="form-group">
                <label for="email">Secure Identifier / Email</label>
                <input type="email" id="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="submit-btn">Authenticate</button>
        </form>
        <div class="switch-prompt">
            New to the portal? <a href="signup.html">Create an account</a>
        </div>
    </div>

</body>
</html>
